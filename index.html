<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thanh Long & Thanh Hằng – Wedding Day</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ===== HERO ===== -->
<section class="hero">
    <div class="hero-content">
        <p class="save">SAVE THE DATE</p>
        <h1 class="couple-name">Thanh Long & Thanh Hằng</h1>
        <p class="type">Prewedding</p>
        <p class="date">07.03.2026</p>
        <div class="scroll-hint">↓ Cuộn xuống để xem ↓</div>
    </div>
</section>

<!-- ===== ALBUM SUB TITLE ===== -->
<section class="album-title">
    <p>Lưu giữ khoảnh khắc đáng nhớ</p>
</section>

<!-- ===== GALLERY ===== -->
<section class="gallery">
    <div class="masonry" id="gallery">

        <!-- TEMPLATE CHO MỖI ẢNH -->
        <template id="photoTemplate">
            <div class="grid-item">
                <img>
                <div class="heart-box">
                    <span class="heart-btn">❤</span>
                    <span class="heart-count">0</span>
                </div>
            </div>
        </template>

    </div>
</section>
<!-- ===== SHARE SECTION ===== -->
<div class="share-section">
    <button id="shareBtn">➦ Chia sẻ tới bạn bè</button>
    <button id="globalSlideBtn">▶ Trình chiếu toàn bộ</button>
</div>

<!-- ===== PREMIUM LIGHTBOX ===== -->
<div class="lightbox" id="lightbox">
    <div class="lightbox-inner">

        <!-- nút tải ảnh -->
        <span id="downloadBtn" class="download">⇩ Tải ảnh</span>


        <!-- nút đóng -->
        <span class="close" id="closeBtn">×</span>

        <!-- điều hướng -->
        <span class="nav prev" id="prevBtn">‹</span>
        <img id="lightboxImg">
        <span class="nav next" id="nextBtn">›</span>

        <div class="counter" id="counter"></div>
    </div>
</div>

<!-- ===== FOOTER ===== -->
<footer>
    <img src="assets/logo.png" class="logo">
    <p>Designed by CINO</p>
    <p>Liên hệ zalo: 0969.456.914</p>
    <p>Ủng hộ gói Hảo Hảo: Vietcombank - 0821000107509</p>
</footer>

<!-- ===== MUSIC ===== -->
<audio id="bgMusic" loop>
    <source src="assets/music/music.mp3" type="audio/mpeg">
</audio>
<button id="musicToggle" class="music-btn">🔊</button>

<script src="main.js"></script>
</body>
</html>
